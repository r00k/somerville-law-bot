  expect_confidence_at_least: medium

- id: graffiti-removal
  question: If graffiti appears on my building, am I responsible for removing it?
  # coo:1141 (Sec. 9-61): "The prompt removal of graffiti shall be the
  # responsibility of the owner"; private owners must remove it within ten
  # days of written notice.
  expect_answer_contains_any: ["yes", "owner", "responsible", "ten days"]
  expect_cited_sections_any: ["coo:1141", "*graffiti*"]
  expect_confidence_at_least: medium

- id: snow-emergency-parking
  question: Can I park on the street during a declared snow emergency in Somerville?
  # coo:2328 (Section 10-10, "Snow emergency tow zone"): once an emergency
  # is declared and announced, "no motor vehicle shall be allowed to park or
  # stand within the limits of any of the ways" named in the schedule;
  # vehicles are subject to towing.
  expect_answer_contains_any: ["no", "prohibited", "towed", "not allowed"]
  expect_cited_sections_any: ["coo:2328", "*snow emergency*"]
  expect_confidence_at_least: medium

- id: abandoned-vehicle
  question: What happens if I abandon a car on the street in Somerville?
  # coo:784 (Sec. 9-91): "Whoever abandons or discards a motor vehicle or
  # parts of a motor vehicle on public or private property within the city
  # shall be punished in accordance with section 1-11."
  expect_answer_contains_any: ["fine", "penalt", "punished", "1-11"]
  expect_cited_sections_any: ["coo:784", "*abandoned automobiles*"]
  expect_confidence_at_least: medium
