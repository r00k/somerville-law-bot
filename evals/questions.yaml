- id: third-story-addition
  question: Can I add a third story to my house?
  # No single "third story" rule -- max building height/stories is set per
  # zoning district (e.g. zon:352/356/360 "General Building" story limits,
  # zon:465/478 district Character Descriptions, zon:462 Massing & Height).
  # A correct answer is conditional on the property's zoning district;
  # kept permissive per DESIGN.md.
  expect_answer_contains_any: ["district", "zoning district", "depends"]
  # Any district building-type standard (3.1.x/3.2.x house types), general
  # massing/height rules, or nonconforming-structure rules are acceptable
  # citations -- the agent may legitimately answer via any of these routes.
  expect_cited_sections_any:
    - "zon:352"
    - "zon:356"
    - "zon:360"
    - "zon:462"
    - "zon:465"
    - "zon:478"
    - "*general building*"
    - "*character description*"
    - "*massing*height*"
    - "*detached house*"
    - "*triple decker*"
    - "*duplex*"
    - "*apartment house*"
    - "*cottage*"
    - "*nonconforming structures*"

