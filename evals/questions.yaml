  # required, so it is not asserted here.)
  expect_answer_contains_all:
    - ["22.46", "twenty-two dollars and forty six cents"]
    - ["15,000", "fifteen thousand"]
  expect_cited_sections_any: ["zon:817", "*linkage*"]
  expect_confidence_at_least: medium

- id: late-night-music
  question: My neighbor is blasting a stereo at 11:30 PM on a Tuesday and it's clearly audible in my apartment. Is that a violation of Somerville's ordinances, and what penalty applies to a first offense?
  # Judgment leap (two-hop): coo:822 (Sec. 9-116, radios/amplifiers between
  # 11:00 p.m. and 7:00 a.m.) establishes the violation, but the penalty
  # lives in coo:184 (Sec. 1-11(b) fine schedule): "1st offense: Warning,
  # 2nd offense: $100.00, 3rd & subsequent offense: $300.00." A model that
  # answers "$300" for a first offense fails — hence the required "warning"
  # and the requirement that BOTH sections be cited.
  expect_answer_contains_all:
    - ["warning"]
    - ["11:00 p.m.", "11 p.m.", "11:00 pm", "11pm", "11 pm"]
  expect_cited_sections_all:
    - ["coo:822", "*noise disturbances*"]
    - ["coo:184", "*penalties and violations*"]
  expect_confidence_at_least: medium

- id: new-building-parking-permit
  question: I just moved into an apartment building in Somerville that received its first certificate of occupancy in 2022. Can I get a residential parking permit?
  # Judgment leap: coo:2374 (Section 15-2.1) prohibits permits for addresses
  # first occupied on/after January 15, 2020 -- but only "for any property
  # shown on... Map A" (incorporated by reference, not reproduced in the
  # text), and the Director of Parking may waive the prohibition
  # (disabilities, deed-restricted affordable units, extenuating
  # circumstances). A flat yes or flat no both fail; the answer must flag
  # the Map A dependency and the waiver path.
  expect_answer_contains_all:
    - ["map a"]
    - ["january 15, 2020", "2020"]
    - ["waive", "waiver"]
  expect_cited_sections_any: ["coo:2374", "*residential permit parking*"]

- id: towing-charge-amount
  question: Exactly how much (in dollars) will Somerville charge me if my car is towed during a snow emergency?
  # Hallucination trap: no dollar amount exists in the corpus. coo:2321
  # (Traffic Regs Section 10-3, Fees) caps towing/storage at what state law
  # authorizes; coo:873 (Sec. 11-2) says the charges "are on file in the
  # city clerk's office." Any specific dollar figure is a failure, hence the
  # "$" ban.
  # No expect_cited_sections_any: citing coo:2321/coo:873 is ideal, but an
  # honest citation-less "the code doesn't say" is also acceptable, and the
  # any-check would wrongly fail that shape.
  expect_answer_contains_any: ["state law", "statute", "city clerk", "on file", "not specified", "does not specify", "does not state"]
  expect_answer_not_contains: ["$"]
  allow_no_citations: true

- id: back-porch
  question: Can I add a back porch to my house?
  # zon:471 (3.1.13 Building Components, NR district) Table 3.1.13:
  # "Projecting Porch" is Permitted for Cottage/Detached House/Semi-Detached
  # House/Duplex; "Engaged Porch" is N for Detached Triple Decker and
  # Backyard Cottage. Parallel tables exist per district (zon:484 for UR,
  # etc.), so a correct answer is conditional on district/building type.
  # This is the flagship table-lookup-citation question: the governing law
  # is a table cell, so at least one citation should land on a Building
  # Components section.
  expect_answer_contains_any: ["permitted", "allowed", "building component"]
  expect_answer_contains_all:
    - ["porch"]
    - ["district", "building type", "depends"]
  expect_cited_sections_any:
    - "zon:471"
    - "zon:484"
    - "zon:497"
    - "zon:510"
    - "zon:523"
    - "zon:536"
    - "zon:549"
    - "*building components*"
  expect_confidence_at_least: medium
