# Eval questions for the Somerville law Q&A agent (app/agent.py).
#
# Every expect_* value below was verified against the live corpus by running
# app.law_tools.search_law / get_sections and grepping the source markdown —
# see the summary in the eval-authoring conversation for citations. Section
# keys are corpus-qualified ("coo:N" / "zon:N") per DESIGN.md.
#
# Fields:
#   id                          unique slug
#   question                    the question text sent to agent.ask()
#   expect_answer_contains_any  (optional) case-insensitive substring OR-match
#                                against answer_markdown
#   expect_answer_contains_all  (optional) list of groups; each group is a
#                                string or a list of alternatives. Every group
#                                must match answer_markdown (AND of ORs).
#   expect_answer_not_contains  (optional) case-insensitive substrings that
#                                must NOT appear in answer_markdown
#   expect_cited_sections_all   (optional) like expect_cited_sections_any but
#                                every group (string or list of glob
#                                alternatives) must match some citation —
#                                for multi-hop lookups
#   expect_cited_sections_any   (optional) case-insensitive glob OR-match
#                                against EITHER a citation's section_key or
#                                its section title (fetched via get_sections)
#   expect_confidence_at_least  (optional) low < medium < high
#   expect_confidence_at_most   (optional) low < medium < high
#   allow_no_citations          (optional, default false) skip the "≥1
#                                verified citation" check

- id: leaf-blower-july
  question: Can I use a gas-powered leaf blower in July?
  # coo:1948 (secid split of Sec. 9-120): "the use of leaf blowers is
  # prohibited except between March 15 and May 31 and between October 1 and
  # December 15" -- July falls outside both windows.
  expect_answer_contains_any: ["no", "not permitted", "prohibited"]
  expect_cited_sections_any: ["coo:826", "coo:194*", "*leaf blower*"]
  expect_confidence_at_least: medium

- id: raise-chickens
  question: Can I raise chickens in my backyard in Somerville?
  # coo:2180 ("Board of Health Regulations for the Keeping of Hens"):
  # keeping hens is allowed with a Board of Health permit, max 6 hens,
  # roosters not allowed. This is the exact "chickens -> domestic fowl/hens"
  # synonym gap DESIGN.md calls out.
  expect_answer_contains_any: ["hen", "permit", "board of health"]
  expect_cited_sections_any: ["coo:2178", "coo:2179", "coo:2180", "*hens*", "*keeping of hens*"]
  expect_confidence_at_least: medium

