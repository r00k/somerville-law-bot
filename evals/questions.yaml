# ---------------------------------------------------------------------------
# Curated 10-question suite (added 2026-07-21). Section keys verified against
# app/data/sections.json by regex-matching each question's verbatim source
# text. Q1-Q7 are unequivocal (graded on exactness via contains_all), Q8-Q9
# require combining provisions, Q10 is a hallucination trap (the code defers
# to state law / the city clerk and states no dollar amount).
# ---------------------------------------------------------------------------

- id: council-composition
  question: How many members does the Somerville City Council have, and how are the seats split between at-large and ward councilors?
  # coo:2594 (Charter Section 2-1(a)): "a city council consisting of 11
  # members... Four members... councilors at-large... Seven members...
  # ward councilors... 1 ward councilor to be elected from each of the 7
  # wards."
  expect_answer_contains_all:
    - ["11", "eleven"]
    - ["four", "4"]
    - ["seven", "7"]
    - ["at-large", "at large"]
    - ["ward"]
  expect_cited_sections_any: ["coo:2594", "*composition*"]
  expect_confidence_at_least: high

- id: veto-override
  question: If the mayor vetoes an ordinance, how many city council votes are needed to override the veto? And what happens if the mayor neither signs nor returns a measure?
  # coo:2608 (Charter Section 3-9): override requires "affirmative vote of
  # not less than 8 members"; a measure neither signed nor returned "within
  # 10 days following the date it was presented" is deemed approved and in
  # force.
  expect_answer_contains_all:
    - ["8", "eight"]
    - ["10 days", "ten days"]
    - ["approved", "in force"]
  expect_cited_sections_any: ["coo:2608", "*veto*"]
  expect_confidence_at_least: medium

- id: snow-clearing-details
  question: After a snowstorm ends, how long does a Somerville property owner have to clear the abutting sidewalk, and how wide must the cleared path be?
  # coo:981 (Sec. 12-8(a)): no more than "six hours between sunrise and
  # sunset following the conclusion of a weather event"; cleared path of
  # travel "with a minimum width of thirty-six inches." Full credit requires
  # the sunrise-and-sunset (daylight hours) qualifier, hence contains_all
  # rather than the looser snow-shoveling question above.
  expect_answer_contains_all:
    - ["six hours", "6 hours"]
    - ["sunrise and sunset", "sunrise to sunset", "daylight"]
    - ["thirty-six", "36"]
  expect_cited_sections_any: ["coo:981", "*snow and ice on sidewalks*"]
  expect_confidence_at_least: medium

