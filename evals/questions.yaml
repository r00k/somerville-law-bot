- id: yard-sale-permit
  question: Do I need a permit to hold a yard sale at my house?
  # No yard-sale-specific licensing ordinance found anywhere in either
  # corpus (grepped both source .md files for "yard sale"/"garage sale");
  # the only hit is zon:745 (10.8.4 Exempt Signs), which exempts "yard sale
  # & garage sale signs" from sign permitting -- i.e. nothing in the corpus
  # requires a permit for the sale itself.
  # Two acceptable answer shapes: cite the sign exemption (zon:745), OR give
  # an honest "the corpus has no yard-sale permit requirement" answer with
  # low confidence and no citations (the citation guardrail forces citation-
  # less answers down to low confidence, which is correct here).
  expect_answer_contains_any: ["no permit", "not require", "exempt", "no license", "doesn't appear to have any ordinance requiring a permit"]
  allow_no_citations: true

